# This workflow checks out the repository and lists the files before and after the checkout.
# Checkout is used when you want to clone the repository and access its contents in your workflow. 
# It allows you to work with the code, run tests, build artifacts, and perform other operations that require access to the repository's files.

name: Checkout
on : [push]

jobs:
    checkout-and-display-files:
        runs-on: ubuntu-latest
        steps:
            - name: List Files Before
              run: ls -a
            
            - name: Checkout
              run: |
                git init
                git remote add origin "https://$GITHUB_ACTOR:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git"
                git fetch origin
                git checkout master

            - name: List Files After
              run: ls -a
