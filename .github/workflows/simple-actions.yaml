name: Simple Actions

on:
  push:

jobs:
  simple-action:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Simple JS Action
        id: greet
        uses: ./.github/actions/hello
        with:
          who_to_greet: Ishwar

      - name: Log Greeting Time
        run: echo "${{ steps.greet.outputs.time }}"

      - name: Log ENV Var
        run: echo "$HELLO_TIME"