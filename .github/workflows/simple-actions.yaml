name: Simple Actions

on:
  push:

jobs:
  simple-action:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Send a joke on slack
        uses: ./.github/actions/slack-joke
        id: slack-joke
        with:
          slack_username: IRC
          upload_joke: true
          slack_webhook: ${{ secrets.SLACK_WEBHOOK }}

      - name: Display Joke output
        run: echo '${{ steps.slack-joke.outputs.joke}}'
