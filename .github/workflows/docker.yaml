name: Docker

on:
  workflow_dispatch:

jobs:
  docker-jobs:
    runs-on: ubuntu-latest

    container:
      image: node:22-alpine

      env:
        API_URL: some-url.com

      ports:
        - 80

      # volumes:
      #   - vol_name:/path/in/container
      #   - /path/to/container
      #   - /path/in/host:/path/in/container

      # options: --cpus 1

    steps:
      - name: Log Node & OS Version
        run: |
          node -v
          cat /etc/os-release

      - name: Log Env
        run: echo $API_URL

      - name: Create a file
        run: echo 'Some text' > text.txt

      - name: Container in a Step
        uses: docker://node:22-alpine
        with:
          args: node -p "2+3"

      - name: Log Node Version
        uses: docker://node:22-alpine
        with:
          args: node -v

      - name: Show file contents
        uses: docker://node:22-alpine
        with:
          entrypoint: cat
          args: text.txt
      
      - uses: actions/checkout@v3

      - name: Make script executable
        run: chmod +x script.sh

      - name: Run a bash script
        uses: docker://node:22-alpine
        with:
          entrypoint: ./script.sh
          args: "Some string"

      - name: Send a slack message
        uses: docker://technosophos/slack-notify
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_TITLE: From Github Actions
          SLACK_MESSAGE: "Actor: ${{github.actor}}, Event: ${{github.event_name}}"
          SLACK_COLOR: "#723fc4"