name: First Workflow
on: [push]       #trigger the workflow on push events only

jobs:
    run-shell-commands:
        runs-on: ubuntu-latest
        steps:
            - name: echo a string
              run: echo "Hello, World!"
            - name: Multiline Commands
              run: |
                node -v
                npm -v

    parallel-job-macos:
        runs-on: macos-latest
        steps:
            - name: View SW Version
              run: sw_vers

    dependent-job:
        runs-on: windows-latest
        needs: run-shell-commands
        steps:
            - name: echo a string
              run: Write-Output "Window String"
            - name: Error Step
              run: doesnotexists
        