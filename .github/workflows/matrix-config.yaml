name: Matrix
on: [push]

#------- ORIGINAL --------#
# X {os: ubuntu-latest, node-version: 14, is-ubuntu: true, experimental: false}
# {os: ubuntu-latest, node-version: 15, is-ubuntu: true, experimental: false}
# {os: ubuntu-latest, node-version: 16, is-ubuntu: true, experimental: true}
# {os: windows-latest, node-version: 14, experimental: false}
# {os: windows-latest, node-version: 15, experimental: false}
# {os: windows-latest, node-version: 16, experimental: false}
# {os: macos-latest, node-version: 15}
# {os: ubuntu-latest, node-version: 17 }

jobs:
  node-matrix:
    continue-on-error: ${{ matrix.experimental == true }}

    strategy:
      fail-fast: true

      matrix:
        include:
          - os: ubuntu-latest
            node-version: 14
            is-ubuntu: true
            experimental: false

          - os: ubuntu-latest
            node-version: 15
            is-ubuntu: true
            experimental: false

          - os: ubuntu-latest
            node-version: 16
            is-ubuntu: true
            experimental: true

          - os: windows-latest
            node-version: 14
            experimental: false

          - os: windows-latest
            node-version: 15
            experimental: false

          - os: windows-latest
            node-version: 16
            experimental: false

          - os: macos-latest
            node-version: 16

          - os: ubuntu-latest
            node-version: 17

    runs-on: ${{ matrix.os }}

    steps:
      - if: matrix.experimental == true
        run: exit 1

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: node -v

      - run: echo '${{ toJson(matrix) }}'