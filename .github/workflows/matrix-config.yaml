name: Matrix

on: [push]

jobs:
  node-matrix:
    continue-on-error: ${{ matrix.experimental == true }}

    strategy:
      fail-fast: true

      matrix:
        os: [ubuntu-latest, windows-latest]
        node-version: [14, 15, 16]

        include:
          - os: ubuntu-latest
            is-ubuntu: true

          - os: macos-latest
            node-version: 16

          - os: ubuntu-latest
            node-version: 16
            experimental: true

          - os: ubuntu-latest
            node-version: 17

        exclude:
          - os: ubuntu-latest
            node-version: 16

    runs-on: ${{ matrix.os }}

    steps:
      - if: matrix.experimental == true
        run: exit 1

      - uses: actions/setup-node@v3
        with:
          node-version: ${{ matrix.node-version }}

      - run: node -v

      - run: echo '${{ toJson(matrix) }}'