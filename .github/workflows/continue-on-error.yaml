name: Status Check Function
on: [push]

jobs:
    job-1:
        runs-on: ubuntu-latest
        timeout-minutes: 1
        steps:
            - name: Step 1
              run: sleep 90
              #timeout-minutes: 1

            - name: Step 2
              id: step-2
              continue-on-error: true
              run: exit 1

            - name: Runs on Step 2 Failure
              if: failure() && steps.step-2.outcome == 'failure'
              run: echo 'Step 2 failed'

            - name: Runs on Failure
              if: failure()
              run: echo 'Failure'

            - name: Runs on Success
              if: success()
              run: echo 'runs on success'

            - name: runs on always
              if: always()
              run: echo 'runs on always'

            - name: runs on cancelled
              if: cancelled()
              run: echo 'runs on cancelled'




    job-2:
        runs-on: ubuntu-latest
        needs: job-1
        if: failure()
        steps:
            - run: echo 'Job 2'