# ENV VARS are used to store sensitive information like API keys, tokens, and passwords.
# They can also be used to store configuration values that you want to keep separate from your codebase. In GitHub Actions, you can define environment variables in your workflow file or in the repository settings.

# Contexts are used to access information about the workflow run, such as the repository name, branch name, and commit SHA. Contexts can be used to customize the behavior of your workflow based on the current state of the repository or the workflow run.

name: Environment Variables
on: [push]

env:
    WF_LEVEL_ENV: Available to all jobs

jobs:
    env-vars-and-context:
        runs-on: ubuntu-latest
        if: github.ref == 'refs/heads/main'
        env:
            JOB_LEVEL_ENV: Available to all steps in this env-vars-and-context
        steps:
            - name: Log ENV VAR
              run: echo $GITHUB_REF

            - name: Log Context
              run: echo '${{ github.ref }}'

            - name: Log Custom ENV Vars
              env:
                STEP_LEVEL_ENV: Available only to this step
                WF_LEVEL_ENV: Overridden in step
              run: |
                echo '${{ env.STEP_LEVEL_ENV}}'
                echo $STEP_LEVEL_ENV
                echo $WF_LEVEL_ENV
